name: docker-build-push-example

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"
      - "ai/**"
      - "docker/**"
      - ".github/workflows/docker-build-push.example.yml"

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      API_IMAGE_REPO: ${{ secrets.API_IMAGE_REPO }}
      AI_IMAGE_REPO: ${{ secrets.AI_IMAGE_REPO }}
      IMAGE_TAG: ${{ github.sha }}
      PYTHON_BASE_IMAGE: ${{ secrets.PYTHON_BASE_IMAGE }}
      # 建议与仓库 global.json 中 sdk.version 对齐，例如 mcr.microsoft.com/dotnet/sdk:10.0.201
      DOTNET_SDK_IMAGE: ${{ secrets.DOTNET_SDK_IMAGE }}
      DOTNET_ASPNET_IMAGE: ${{ secrets.DOTNET_ASPNET_IMAGE }}
      POSTGRES_IMAGE: ${{ secrets.POSTGRES_IMAGE }}
      REDIS_IMAGE: ${{ secrets.REDIS_IMAGE }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      JWT_KEY: ${{ secrets.JWT_KEY }}
      HMAC_SECRET: ${{ secrets.HMAC_SECRET }}
      AURA_ADMIN_USER: ${{ secrets.AURA_ADMIN_USER }}
      AURA_ADMIN_PASSWORD: ${{ secrets.AURA_ADMIN_PASSWORD }}
      ARANGO_URI: http://arangodb:8529
      ARANGO_DB: aura
      ARANGO_USER: _system
      ARANGO_ROOT_PASSWORD: ${{ secrets.ARANGO_ROOT_PASSWORD }}
      ARANGO_PASSWORD: ${{ secrets.ARANGO_ROOT_PASSWORD }}
      AURA_MODEL_PATH: ${{ secrets.AURA_MODEL_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker login
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login "${{ secrets.REGISTRY_HOST }}" -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Build images
        run: sh ./docker/build-images.sh

      - name: Push images
        run: sh ./docker/push-images.sh
