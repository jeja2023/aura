name: dotnet-ci

on:
  push:
    branches: [main, master]
    paths:
      - "backend/**"
      - "ai/**"
      - "frontend/**"
      - "start_services.py"
      - "database/**"
      - "Aura.sln"
      - ".github/workflows/**"
      - ".editorconfig"
      - ".env.example"
      - "Directory.Build.props"
      - "global.json"
      - "deploy/**"
  pull_request:
    branches: [main, master]
    paths:
      - "backend/**"
      - "ai/**"
      - "frontend/**"
      - "start_services.py"
      - "database/**"
      - "Aura.sln"
      - ".github/workflows/**"
      - ".editorconfig"
      - ".env.example"
      - "Directory.Build.props"
      - "global.json"
      - "deploy/**"

concurrency:
  group: dotnet-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      ai: ${{ steps.filter.outputs.ai }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect backend/frontend/ai changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - "backend/**"
              - "Aura.sln"
              - "database/**"
              - ".github/workflows/**"
              - ".editorconfig"
              - ".env.example"
              - "Directory.Build.props"
              - "global.json"
              - "deploy/**"
            frontend:
              - "frontend/**"
              - ".github/workflows/**"
              - ".editorconfig"
              - ".env.example"
            ai:
              - "ai/**"
              - "start_services.py"
              - ".github/workflows/**"
              - ".editorconfig"
              - ".env.example"

  backend:
    name: Backend Build And Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('global.json', 'Directory.Build.props', 'Aura.sln', 'backend/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore solution
        run: dotnet restore "${{ github.workspace }}/Aura.sln"

      - name: Build solution
        run: dotnet build "${{ github.workspace }}/Aura.sln" -c Release --no-restore

      - name: Check NuGet vulnerabilities
        run: dotnet list "${{ github.workspace }}/Aura.sln" package --vulnerable --include-transitive

      - name: Run backend unit tests
        run: dotnet test "${{ github.workspace }}/backend/Aura.Api.Tests/Aura.Api.Tests.csproj" -c Release --no-build --no-restore --verbosity normal

      - name: Run backend integration tests
        run: dotnet test "${{ github.workspace }}/backend/Aura.Api.Integration.Tests/Aura.Api.Integration.Tests.csproj" -c Release --no-build --no-restore --verbosity normal

  frontend:
    name: Frontend Lint And Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json', 'frontend/playwright.smoke.config.js') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Run frontend smoke tests
        working-directory: frontend
        run: npm run smoke

      - name: Upload frontend smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-smoke-artifacts
          path: |
            frontend/test-results
            frontend/playwright-report
          if-no-files-found: ignore

  ai:
    name: AI Pytest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: detect-changes
    if: needs.detect-changes.outputs.ai == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            ai/requirements.txt
            ai/requirements-dev.txt

      - name: Validate start_services.py syntax
        run: python -m py_compile start_services.py

      - name: Install AI test dependencies
        working-directory: ai
        run: python -m pip install -r requirements-dev.txt

      - name: Run AI pytest
        working-directory: ai
        run: python -m pytest tests -q

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - detect-changes
      - backend
      - frontend
      - ai

    steps:
      - name: Summarize CI results
        shell: bash
        env:
          BACKEND_CHANGED: ${{ needs.detect-changes.outputs.backend }}
          FRONTEND_CHANGED: ${{ needs.detect-changes.outputs.frontend }}
          AI_CHANGED: ${{ needs.detect-changes.outputs.ai }}
          BACKEND_RESULT: ${{ needs.backend.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          AI_RESULT: ${{ needs.ai.result }}
        run: |
          echo "## CI Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Area | Changed | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend | ${BACKEND_CHANGED} | ${BACKEND_RESULT} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend | ${FRONTEND_CHANGED} | ${FRONTEND_RESULT} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| AI | ${AI_CHANGED} | ${AI_RESULT} |" >> "$GITHUB_STEP_SUMMARY"

          if [[ "$BACKEND_CHANGED" == "true" && "$BACKEND_RESULT" != "success" ]]; then
            echo "Backend checks failed or were cancelled." >&2
            exit 1
          fi

          if [[ "$FRONTEND_CHANGED" == "true" && "$FRONTEND_RESULT" != "success" ]]; then
            echo "Frontend checks failed or were cancelled." >&2
            exit 1
          fi

          if [[ "$AI_CHANGED" == "true" && "$AI_RESULT" != "success" ]]; then
            echo "AI checks failed or were cancelled." >&2
            exit 1
          fi
