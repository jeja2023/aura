# 示例：API Pod 入站默认拒绝，仅允许必要来源访问业务端口（此处为 5000）。
# 说明：此策略不区分 HTTP 路径；与「公网禁 /metrics」配合时，请使用 Ingress 片段或网格策略。
# 占位：请将 namespace、podSelector、ingress 控制器命名空间与监控命名空间改为实际值。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aura-api-ingress-and-monitoring
  namespace: aura-prod
spec:
  podSelector:
    matchLabels:
      app: aura-api
  policyTypes:
    - Ingress
  ingress:
    # 同命名空间内其它组件（如 sidecar、同栈 Job）
    - from:
        - podSelector: {}
    # Ingress 控制器所在命名空间（常见为 ingress-nginx）
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
    # Prometheus / VictoriaMetrics 等抓取端所在命名空间
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
