services:
  pgsql:
    image: ${POSTGRES_IMAGE}
    container_name: aura-pgsql
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - aura-pgsql-data:/var/lib/postgresql/data
      - ../database/schema.pgsql.sql:/docker-entrypoint-initdb.d/01-schema.pgsql.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: ${REDIS_IMAGE}
    container_name: aura-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - aura-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  arangodb:
    image: ${ARANGO_IMAGE:-arangodb:3.12}
    container_name: aura-arangodb
    restart: unless-stopped
    ports:
      - "8529:8529"
    environment:
      ARANGO_ROOT_PASSWORD: ${ARANGO_ROOT_PASSWORD}
    volumes:
      - aura-arango-data:/var/lib/arangodb3

  ai:
    build:
      context: ../
      dockerfile: docker/ai.Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE}
    image: aura-ai:local
    container_name: aura-ai
    restart: unless-stopped
    environment:
      ARANGO_URI: ${ARANGO_URI}
      ARANGO_DB: ${ARANGO_DB}
      ARANGO_USER: ${ARANGO_USER}
      ARANGO_PASSWORD: ${ARANGO_PASSWORD}
      AURA_MODEL_PATH: ${AURA_MODEL_PATH}
    ports:
      - "8000:8000"
    depends_on:
      - arangodb
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/').read()"]
      interval: 15s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../
      dockerfile: docker/backend.Dockerfile
      args:
        DOTNET_SDK_IMAGE: ${DOTNET_SDK_IMAGE}
        DOTNET_ASPNET_IMAGE: ${DOTNET_ASPNET_IMAGE}
    image: aura-api:local
    container_name: aura-api
    restart: unless-stopped
    environment:
      # 一键部署脚本写入 Production；本地可复制 .env.full.example 为 Development
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://0.0.0.0:5000
      ConnectionStrings__PgSql: Host=pgsql;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      ConnectionStrings__Redis: redis:6379
      Ai__BaseUrl: http://ai:8000
      Jwt__Key: ${JWT_KEY}
      Security__HmacSecret: ${HMAC_SECRET}
      AURA_ADMIN_USER: ${AURA_ADMIN_USER}
      AURA_ADMIN_PASSWORD: ${AURA_ADMIN_PASSWORD}
      Paths__FrontendRoot: /app/frontend
    volumes:
      # 开发联调：前端源码只读挂载；业务数据（抓拍、导出、告警落盘等）使用命名卷持久化
      - ../frontend:/app/frontend:ro
      - aura-api-storage:/app/storage
    ports:
      - "5000:5000"
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai:
        condition: service_healthy

volumes:
  aura-pgsql-data:
  aura-redis-data:
  aura-arango-data:
  aura-api-storage:
