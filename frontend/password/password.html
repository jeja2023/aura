<!-- 文件：改密页（password.html） | File: Password Change Page -->
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>修改密码</title>
  <script src="../common/theme-pref.js"></script>
  <link rel="stylesheet" href="../common/theme.css" />
  <link rel="stylesheet" href="../common/forms.css" />
  <link rel="stylesheet" href="./password.css" />
</head>
<body>
  <div class="password-page">
    <div class="password-brand">
      <img class="password-brand-icon" src="/common/favicon.svg" alt="Aura 图标" />
      <span class="password-brand-text">寓瞳</span>
    </div>
    <main class="password-box">
      <h1>修改密码</h1>
      <p id="passwordLead" class="password-desc">为了保障账号安全，请先完成密码更新后再继续使用系统。</p>
      <div id="passwordUserName" class="password-user" hidden></div>
      <div class="password-tips">
        <div>新密码要求：至少 12 位，且同时包含大写字母、小写字母、数字和特殊字符。</div>
      </div>
      <input id="currentPassword" class="aura-input" type="password" placeholder="当前密码" autocomplete="current-password" />
      <input id="newPassword" class="aura-input" type="password" placeholder="新密码" autocomplete="new-password" />
      <input id="confirmPassword" class="aura-input" type="password" placeholder="确认新密码" autocomplete="new-password" />
      <button id="submitPassword" type="button">确认修改</button>
      <button id="logoutButton" class="password-ghost-btn" type="button">退出登录</button>
      <pre id="result" class="aura-display-box" hidden></pre>
    </main>
  </div>
  <script src="./password.js"></script>
</body>
</html>
