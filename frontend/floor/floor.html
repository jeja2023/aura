<!-- 文件：楼层页（floor.html） | File: Floor Page -->
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>楼层</title>
  <script src="../common/theme-pref.js"></script>
  <link rel="stylesheet" href="../common/theme.css" />
  <link rel="stylesheet" href="../common/shell.css" />
  <link rel="stylesheet" href="../common/forms.css" />
  <link rel="stylesheet" href="./floor.css" />
</head>
<body class="app-body" data-shell-title="楼层图纸">
  <aside class="app-sidebar" id="auraSidebar" aria-label="主导航"></aside>
  <div class="app-frame">
    <header class="app-topbar">
      <button type="button" class="app-sidebar-toggle" id="auraSidebarToggle" aria-label="展开或收起导航">菜单</button>
      <h1 class="app-page-title"></h1>
      <div class="app-topbar-actions"></div>
    </header>
    <main class="app-content">
      <div class="page">
        <section class="card floor-toolbar">
          <label>资源节点ID <input id="nodeId" type="number" value="3" /></label>
          <label>缩放比例 <input id="scaleRatio" type="number" step="0.0001" value="1.0000" /></label>
          <input id="file" type="file" accept=".png,.jpg,.jpeg,.webp,.svg" aria-label="选择楼层图文件" />
          <button id="uploadBtn" class="btn-primary" type="button">上传并创建楼层图</button>
          <button id="listBtn" class="btn-secondary" type="button">查询楼层图</button>
        </section>
        <section class="card">
          <h2>预览</h2>
          <img id="preview" alt="floor-preview" />
        </section>
        <pre id="result" class="aura-status" role="status" hidden aria-live="polite"></pre>
      </div>
    </main>
  </div>
  <script defer src="../common/shell.js"></script>
  <script defer src="./floor.js"></script>
</body>
</html>
