<!-- 文件：楼层页（floor.html） | File: Floor Page -->
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>楼层</title>
  <link rel="stylesheet" href="./floor.css" />
</head>
<body>
  <main class="page">
    <h1>楼层平面图上传与展示</h1>
    <section class="card">
      <label>资源节点ID <input id="nodeId" type="number" value="3" /></label>
      <label>缩放比例 <input id="scaleRatio" type="number" step="0.0001" value="1.0000" /></label>
      <input id="file" type="file" accept=".png,.jpg,.jpeg,.webp,.svg" />
      <button id="uploadBtn">上传并创建楼层图</button>
      <button id="listBtn">查询楼层图</button>
    </section>
    <section class="card">
      <h2>预览</h2>
      <img id="preview" alt="floor-preview" />
    </section>
    <pre id="result">等待操作</pre>
  </main>
  <script src="./floor.js"></script>
</body>
</html>
