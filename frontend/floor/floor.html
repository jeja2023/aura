<!-- 文件：楼层页（floor.html） | File: Floor Page -->
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>楼层</title>
  <script src="../common/theme-pref.js"></script>
  <link rel="stylesheet" href="../common/theme.css" />
  <link rel="stylesheet" href="../common/shell.css" />
  <link rel="stylesheet" href="../common/forms.css" />
  <link rel="stylesheet" href="./floor.css" />
</head>
<body class="app-body" data-shell-title="楼层图纸">
  <aside class="app-sidebar" id="auraSidebar" aria-label="主导航"></aside>
  <div class="app-frame">
    <header class="app-topbar">
      <button type="button" class="app-sidebar-toggle" id="auraSidebarToggle" aria-label="展开或收起导航">菜单</button>
      <h1 class="app-page-title"></h1>
      <div class="app-topbar-actions"></div>
    </header>
    <main class="app-content">
      <div class="page">
        <div class="floor-layout">
          <section class="card floor-panel floor-panel-list" aria-label="楼层图列表">
            <div class="floor-panel-head">
              <h2 class="floor-panel-title">楼层图列表</h2>
              <div class="floor-panel-head-actions">
                <span id="floorCount" class="floor-count" aria-label="列表数量"></span>
              </div>
            </div>
            <label class="floor-search" aria-label="搜索楼层图">
              <span class="floor-search-label">搜索</span>
              <input id="floorKeyword" class="aura-input aura-search-input" type="text" placeholder="按楼层ID / 节点ID 筛选" />
            </label>
            <div id="floorList" class="floor-list" aria-live="polite"></div>
          </section>

          <div class="floor-main">
            <section class="card floor-panel floor-panel-preview" aria-label="预览">
              <div class="floor-panel-head">
                <h2 class="floor-panel-title">预览</h2>
                <div class="floor-panel-head-actions">
                  <button id="openUploadModalBtn" class="btn-primary" type="button">上传与创建</button>
                  <button id="refreshBtnTop" class="btn-secondary" type="button">刷新</button>
                  <button id="openPreviewBtn" class="btn-secondary" type="button" disabled>新窗口打开</button>
                </div>
              </div>
              <div class="floor-preview-wrap">
                <img id="preview" alt="floor-preview" />
              </div>
            </section>
          </div>
        </div>
        <pre id="result" class="aura-status aura-display-box" role="status" hidden aria-live="polite"></pre>
      </div>
    </main>
  </div>
  <script defer src="../common/shell.js"></script>
  <script defer src="../common/floor-image-url.js"></script>
  <script defer src="./floor.js"></script>
</body>
</html>
