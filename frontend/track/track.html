<!-- 文件：轨迹页（track.html） | File: Track Page -->
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>轨迹</title>
  <script src="../common/theme-pref.js"></script>
  <link rel="stylesheet" href="../common/theme.css" />
  <link rel="stylesheet" href="../common/shell.css" />
  <link rel="stylesheet" href="../common/forms.css" />
  <link rel="stylesheet" href="./track.css" />
</head>
<body class="app-body" data-shell-title="轨迹回放">
  <aside class="app-sidebar" id="auraSidebar" aria-label="主导航"></aside>
  <div class="app-frame">
    <header class="app-topbar">
      <button type="button" class="app-sidebar-toggle" id="auraSidebarToggle" aria-label="展开或收起导航">菜单</button>
      <h1 class="app-page-title"></h1>
      <div class="app-topbar-actions"></div>
    </header>
    <main class="app-content">
      <div class="page">
        <p class="page-lead">在平面图上按时间序列播放历史动线。</p>
        <section class="bar track-toolbar">
          <input
            id="vid"
            class="aura-search-input"
            type="text"
            placeholder="请输入人员虚拟编号"
            aria-label="人员虚拟编号"
            autocomplete="off"
          />
          <button id="load" class="btn-secondary" type="button">刷新轨迹</button>
          <button id="play" class="btn-secondary" type="button">播放动画</button>
          <button id="pause" class="btn-secondary" type="button">暂停</button>
        </section>
        <canvas id="canvas" width="900" height="520"></canvas>
        <pre id="result" class="aura-status aura-display-box" role="status" hidden aria-live="polite"></pre>
      </div>
    </main>
  </div>
  <script defer src="../common/shell.js"></script>
  <script defer src="./track.js"></script>
</body>
</html>
