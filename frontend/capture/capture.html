<!-- 文件：抓拍页（capture.html） | File: Capture Page -->
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>抓拍</title>
  <script src="../common/theme-pref.js"></script>
  <link rel="stylesheet" href="../common/theme.css" />
  <link rel="stylesheet" href="../common/shell.css" />
  <link rel="stylesheet" href="../common/forms.css" />
  <link rel="stylesheet" href="./capture.css" />
</head>
<body class="app-body" data-shell-title="抓拍记录">
  <aside class="app-sidebar" id="auraSidebar" aria-label="主导航"></aside>
  <div class="app-frame">
    <header class="app-topbar">
      <button type="button" class="app-sidebar-toggle" id="auraSidebarToggle" aria-label="展开或收起导航">菜单</button>
      <h1 class="app-page-title"></h1>
      <div class="app-topbar-actions"></div>
    </header>
    <main class="app-content">
      <div class="page">
        <div class="capture-toolbar">
          <button id="load" class="btn-secondary" type="button">查询抓拍</button>
          <button id="openCreateCaptureModal" class="btn-primary" type="button">新增模拟抓拍</button>
          <button id="exportCapture" class="btn-secondary" type="button">导出</button>
        </div>
        <pre id="result" class="aura-status aura-display-box" role="status" hidden aria-live="polite"></pre>
        <div id="captureTableWrap" class="capture-table-wrap" hidden>
          <div class="aura-data-table-wrap">
            <table class="aura-data-table" aria-label="抓拍列表">
              <thead id="captureTableHead"></thead>
              <tbody id="captureTableBody"></tbody>
            </table>
          </div>
        </div>
        <div id="capturePager" hidden></div>
      </div>
    </main>
  </div>

  <div id="captureCreateModal" class="aura-modal-root" hidden>
    <div class="aura-modal-backdrop" tabindex="-1" aria-hidden="true"></div>
    <div class="aura-modal-panel capture-modal-create" role="dialog" aria-modal="true" aria-labelledby="captureCreateModalTitle">
      <div class="aura-modal-head">
        <h2 id="captureCreateModalTitle" class="aura-modal-title">新增模拟抓拍</h2>
        <button type="button" class="btn-secondary aura-modal-close" data-aura-modal-dismiss aria-label="关闭对话框">关闭</button>
      </div>
      <div class="capture-modal-fields aura-modal-fields">
        <input id="deviceId" class="aura-input" placeholder="设备ID，默认1" />
        <input id="channelNo" class="aura-input" placeholder="通道号，默认1" />
        <input id="meta" class="aura-input" placeholder="元数据，如：异常-夜间滞留" />
      </div>
      <div class="aura-modal-actions">
        <button type="button" class="btn-secondary" data-aura-modal-dismiss>取消</button>
        <button id="create" type="button" class="btn-primary">新增抓拍</button>
      </div>
      <pre id="createCaptureResult" class="aura-status aura-display-box" role="status" hidden aria-live="polite"></pre>
    </div>
  </div>
  <script defer src="../common/shell.js"></script>
  <script defer src="./capture.js"></script>
</body>
</html>
