<!-- 文件：统计页（stats.html） | File: Stats Page -->
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>统计</title>
  <link rel="stylesheet" href="./stats.css" />
</head>
<body>
  <main class="page">
    <h1>ECharts 统计驾驶舱</h1>
    <div class="toolbar">
      <button id="load">刷新统计</button>
    </div>
    <section class="grid">
      <div class="card">
        <h2>近7日抓拍/告警</h2>
        <div id="dailyChart" class="chart"></div>
      </div>
      <div class="card">
        <h2>设备抓拍Top10</h2>
        <div id="deviceChart" class="chart"></div>
      </div>
      <div class="card">
        <h2>告警类型占比</h2>
        <div id="alertChart" class="chart"></div>
      </div>
    </section>
    <pre id="result">等待查询</pre>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
  <script src="./stats.js"></script>
</body>
</html>
