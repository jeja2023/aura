<!-- 文件：设备页（device.html） | File: Device Page -->
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>设备</title>
  <script src="../common/theme-pref.js"></script>
  <link rel="stylesheet" href="../common/theme.css" />
  <link rel="stylesheet" href="../common/shell.css" />
  <link rel="stylesheet" href="../common/forms.css" />
  <link rel="stylesheet" href="./device.css" />
</head>
<body class="app-body" data-shell-title="NVR 设备管理">
  <aside class="app-sidebar" id="auraSidebar" aria-label="主导航"></aside>
  <div class="app-frame">
    <header class="app-topbar">
      <button type="button" class="app-sidebar-toggle" id="auraSidebarToggle" aria-label="展开或收起导航">菜单</button>
      <h1 class="app-page-title"></h1>
      <div class="app-topbar-actions"></div>
    </header>
    <main class="app-content">
      <div class="page">
        <button id="load" class="btn-secondary" type="button">查询设备</button>
        <pre id="result" class="aura-status aura-display-box" role="status" hidden aria-live="polite"></pre>
        <div id="deviceTableWrap" class="device-table-wrap" hidden>
          <div class="aura-data-table-wrap">
            <table class="aura-data-table" aria-label="设备列表">
              <thead id="deviceTableHead"></thead>
              <tbody id="deviceTableBody"></tbody>
            </table>
          </div>
        </div>
        <div id="devicePager" hidden></div>
      </div>
    </main>
  </div>
  <script defer src="../common/shell.js"></script>
  <script defer src="./device.js"></script>
</body>
</html>
