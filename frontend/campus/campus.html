<!-- 文件：资源页（campus.html） | File: Campus Page -->
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>资源</title>
  <script src="../common/theme-pref.js"></script>
  <link rel="stylesheet" href="../common/theme.css" />
  <link rel="stylesheet" href="../common/shell.css" />
  <link rel="stylesheet" href="../common/forms.css" />
  <link rel="stylesheet" href="./campus.css" />
</head>
<body class="app-body" data-shell-title="集宿资源树">
  <aside class="app-sidebar" id="auraSidebar" aria-label="主导航"></aside>
  <div class="app-frame">
    <header class="app-topbar">
      <button type="button" class="app-sidebar-toggle" id="auraSidebarToggle" aria-label="展开或收起导航">菜单</button>
      <h1 class="app-page-title"></h1>
      <div class="app-topbar-actions"></div>
    </header>
    <main class="app-content">
      <div class="page">
        <div class="page-head">
          <div class="page-head-main">
            <h2 class="page-title">资源树总览</h2>
            <p class="page-subtitle">支持按关键字筛选节点，并可一键展开或收起全部层级。</p>
          </div>
          <div id="treeStats" class="tree-stats" aria-live="polite"></div>
        </div>
        <div class="page-actions">
          <label class="tree-search" aria-label="搜索资源节点">
            <span class="tree-search-label">搜索</span>
            <input id="treeKeyword" class="aura-input aura-search-input" type="text" placeholder="按名称 / 层级 / ID 筛选" />
          </label>
          <button id="expandAllBtn" class="btn-secondary" type="button">全部展开</button>
          <button id="collapseAllBtn" class="btn-secondary" type="button">全部收起</button>
          <button id="load" class="btn-secondary" type="button">刷新资源树</button>
        </div>
        <pre id="result" class="aura-status aura-display-box" role="status" hidden aria-live="polite"></pre>
        <div id="treeWrap" class="tree-wrap" hidden>
          <ul id="treeRoot" class="campus-tree" aria-label="集宿资源树"></ul>
        </div>
      </div>
    </main>
  </div>
  <script defer src="../common/shell.js"></script>
  <script defer src="./campus.js"></script>
</body>
</html>
