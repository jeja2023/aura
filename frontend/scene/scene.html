<!-- 文件：三维态势页（scene.html） | File: Scene Page -->
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>三维态势</title>
  <script src="../common/theme-pref.js"></script>
  <link rel="stylesheet" href="../common/theme.css" />
  <link rel="stylesheet" href="../common/shell.css" />
  <link rel="stylesheet" href="../common/forms.css" />
  <link rel="stylesheet" href="./scene.css" />
</head>
<body class="app-body" data-shell-title="三维空间态势">
  <aside class="app-sidebar" id="auraSidebar" aria-label="主导航"></aside>
  <div class="app-frame">
    <header class="app-topbar">
      <button type="button" class="app-sidebar-toggle" id="auraSidebarToggle" aria-label="展开或收起导航">菜单</button>
      <h1 class="app-page-title"></h1>
      <div class="app-topbar-actions"></div>
    </header>
    <main class="app-content scene-mode">
      <div class="page">
        <section class="left">
          <div class="toolbar">
            <button id="resetBtn" class="btn-secondary" type="button">重置视角</button>
            <button id="back3dBtn" class="btn-secondary" type="button">返回3D总览</button>
          </div>
          <div class="stage-wrap">
            <div id="stage3d"></div>
            <div class="scene-overlay">
              <div class="scene-overlay-card">
                <div class="scene-overlay-title">场景提示</div>
                <p>点击楼层可下钻到 2D 切片，实时事件会联动楼层闪烁与右侧事件流。</p>
              </div>
              <div class="floor-chip-list" id="floorChips"></div>
            </div>
          </div>
        </section>
        <section class="right">
          <div class="stats-grid">
            <article class="stat-card">
              <span class="stat-label">楼层总数</span>
              <strong id="metricFloors">0</strong>
            </article>
            <article class="stat-card">
              <span class="stat-label">摄像头</span>
              <strong id="metricCameras">0</strong>
            </article>
            <article class="stat-card">
              <span class="stat-label">告警总量</span>
              <strong id="metricAlerts">0</strong>
            </article>
            <article class="stat-card">
              <span class="stat-label">当前模式</span>
              <strong id="metricMode">3D总览</strong>
            </article>
          </div>

          <section class="panel">
            <div class="panel-title-row">
              <h2>楼层态势</h2>
              <span class="panel-hint">选中楼层后同步显示切片与计数</span>
            </div>
            <div id="floorSummary" class="floor-summary">当前未选中楼层，展示全局态势。</div>
          </section>

          <section class="panel">
            <div class="panel-title-row">
              <h2>2D 楼层切片</h2>
              <span class="panel-hint">摄像头位与热点会随事件变化</span>
            </div>
            <canvas id="slice2d" width="520" height="360"></canvas>
          </section>

          <section class="panel">
            <div class="panel-title-row">
              <h2>实时事件流</h2>
              <span class="panel-hint">保留最近 12 条</span>
            </div>
            <div class="event-filter-bar" id="eventFilterBar" role="tablist" aria-label="事件类型筛选">
              <button type="button" class="event-filter-chip is-active" data-event-filter="all">全部</button>
              <button type="button" class="event-filter-chip" data-event-filter="capture">抓拍</button>
              <button type="button" class="event-filter-chip" data-event-filter="alert">告警</button>
              <button type="button" class="event-filter-chip" data-event-filter="track">轨迹</button>
            </div>
            <ul id="eventFeed" class="event-feed"></ul>
          </section>

          <pre id="result" class="aura-status aura-display-box">提示：点击 3D 楼层或右上楼层标签可下钻到 2D 切片。</pre>
        </section>
      </div>
    </main>
  </div>
  <script defer src="../common/shell.js"></script>
  <!-- 三维依赖仅从 frontend/common/vendor 本地加载（three、signalr），不经 CDN -->
  <script
    defer
    id="auraSceneVendorLoader"
    data-aura-page-js="./scene.js"
    src="../common/scene-vendor-loader.js"
  ></script>
</body>
</html>
