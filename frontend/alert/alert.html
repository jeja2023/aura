<!-- 文件：告警页（alert.html） | File: Alert Page -->
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>告警</title>
  <script src="../common/theme-pref.js"></script>
  <link rel="stylesheet" href="../common/theme.css" />
  <link rel="stylesheet" href="../common/shell.css" />
  <link rel="stylesheet" href="../common/forms.css" />
  <link rel="stylesheet" href="./alert.css" />
</head>
<body class="app-body" data-shell-title="告警中心">
  <aside class="app-sidebar" id="auraSidebar" aria-label="主导航"></aside>
  <div class="app-frame">
    <header class="app-topbar">
      <button type="button" class="app-sidebar-toggle" id="auraSidebarToggle" aria-label="展开或收起导航">菜单</button>
      <h1 class="app-page-title"></h1>
      <div class="app-topbar-actions"></div>
    </header>
    <main class="app-content">
      <div class="page">
        <div class="alert-controls">
          <div class="alert-toolbar">
            <button id="load" class="btn-secondary" type="button">刷新告警</button>
            <button id="openCreateAlertModal" class="btn-primary" type="button">新增告警</button>
            <button id="exportAlert" class="btn-secondary" type="button" hidden>导出</button>
          </div>
          <div class="alert-filter">
            <input id="alertTypeKeyword" class="aura-search-input" placeholder="筛选告警类型" />
            <input id="alertDetailKeyword" class="aura-search-input" placeholder="筛选详情关键字" />
            <label class="alert-filter-time">
              <span>开始时间</span>
              <input id="alertStartTime" class="aura-input" type="datetime-local" />
            </label>
            <label class="alert-filter-time">
              <span>结束时间</span>
              <input id="alertEndTime" class="aura-input" type="datetime-local" />
            </label>
            <button id="alertQuick24h" class="btn-secondary" type="button">最近24小时</button>
            <button id="alertQuick7d" class="btn-secondary" type="button">最近7天</button>
            <button id="applyAlertFilter" class="btn-secondary" type="button">筛选</button>
            <button id="clearAlertFilter" class="btn-secondary" type="button">清空筛选</button>
          </div>
        </div>
        <p id="alertFilterSummary" class="alert-filter-summary" role="status" aria-live="polite" hidden></p>
        <pre id="result" class="aura-status aura-display-box" role="status" hidden aria-live="polite"></pre>
        <div id="tableWrap" class="aura-data-table-wrap" hidden>
          <table class="aura-data-table" aria-label="告警列表">
            <thead>
              <tr>
                <th>告警ID</th>
                <th>告警类型</th>
                <th>详情</th>
                <th>创建时间</th>
              </tr>
            </thead>
            <tbody id="alertTableBody"></tbody>
          </table>
        </div>
        <div id="alertPager" hidden></div>
      </div>
    </main>
  </div>

  <div id="alertCreateModal" class="aura-modal-root" hidden>
    <div class="aura-modal-backdrop" tabindex="-1" aria-hidden="true"></div>
    <div class="aura-modal-panel alert-modal-create" role="dialog" aria-modal="true" aria-labelledby="alertCreateModalTitle">
      <div class="aura-modal-head">
        <h2 id="alertCreateModalTitle" class="aura-modal-title">新增告警</h2>
        <button type="button" class="btn-secondary aura-modal-close" data-aura-modal-dismiss aria-label="关闭对话框">关闭</button>
      </div>
      <div class="alert-modal-fields aura-modal-fields">
        <input id="type" class="aura-input" placeholder="告警类型，如群租告警" />
        <input id="detail" class="aura-input" placeholder="告警详情" />
      </div>
      <div class="aura-modal-actions">
        <button type="button" class="btn-secondary" data-aura-modal-dismiss>取消</button>
        <button id="create" type="button" class="btn-primary">新增告警</button>
      </div>
      <pre id="createAlertResult" class="aura-status aura-display-box" role="status" hidden aria-live="polite"></pre>
    </div>
  </div>
  <script defer src="../common/shell.js"></script>
  <script defer src="./alert.js"></script>
</body>
</html>
