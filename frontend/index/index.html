<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>态势看板</title>
  <script src="../common/theme-pref.js"></script>
  <link rel="stylesheet" href="../common/theme.css" />
  <link rel="stylesheet" href="../common/shell.css" />
  <link rel="stylesheet" href="../common/forms.css" />
  <link rel="stylesheet" href="./index.css" />
</head>
<body class="app-body" data-shell-title="态势看板" data-aura-disable-toast="true">
  <aside class="app-sidebar" id="auraSidebar" aria-label="主导航"></aside>
  <div class="app-frame">
    <header class="app-topbar">
      <button type="button" class="app-sidebar-toggle" id="auraSidebarToggle" aria-label="展开或收起导航">菜单</button>
      <h1 class="app-page-title"></h1>
      <div class="app-topbar-actions">
        <button class="btn-primary" id="refreshBtn" type="button">刷新概览</button>
      </div>
    </header>
    <main class="app-content">
      <div class="dashboard">
        <section class="card">
          <h2>系统状态</h2>
          <div id="statusPanel" class="status-panel" role="status" aria-live="polite">
            <span id="statusBadge" class="status-badge is-loading">加载中</span>
            <div class="status-main">
              <p id="statusText" class="status-text">正在初始化系统状态…</p>
              <p id="statusTime" class="status-time">--</p>
            </div>
          </div>
        </section>
        <section class="card">
          <h2>统计概览</h2>
          <div id="overviewCards" class="overview-cards" role="status" aria-live="polite">
            <article class="overview-item">
              <span class="overview-label">抓拍合计</span>
              <strong id="overviewCapture" class="overview-value">--</strong>
            </article>
            <article class="overview-item">
              <span class="overview-label">告警合计</span>
              <strong id="overviewAlert" class="overview-value">--</strong>
            </article>
            <article class="overview-item">
              <span class="overview-label">在线设备</span>
              <strong id="overviewDevice" class="overview-value">--</strong>
            </article>
          </div>
          <pre id="overviewMessage" class="aura-display-box" data-aura-no-toast hidden></pre>
        </section>
        <section class="card card-wide">
          <h2>态势事件流</h2>
          <ul id="events" class="event-list"></ul>
        </section>
      </div>
    </main>
  </div>
  <script defer src="../common/shell.js"></script>
  <script
    defer
    id="auraSignalrVendorLoader"
    data-aura-page-js="./index.js"
    src="../common/signalr-vendor-loader.js"
  ></script>
</body>
</html>
