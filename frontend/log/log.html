<!-- 文件：日志页（log.html） | File: Log Page -->
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日志</title>
  <script src="../common/theme-pref.js"></script>
  <link rel="stylesheet" href="../common/theme.css" />
  <link rel="stylesheet" href="../common/shell.css" />
  <link rel="stylesheet" href="../common/forms.css" />
  <link rel="stylesheet" href="./log.css" />
</head>
<body class="app-body" data-shell-title="操作与系统日志">
  <aside class="app-sidebar" id="auraSidebar" aria-label="主导航"></aside>
  <div class="app-frame">
    <header class="app-topbar">
      <button type="button" class="app-sidebar-toggle" id="auraSidebarToggle" aria-label="展开或收起导航">菜单</button>
      <h1 class="app-page-title"></h1>
      <div class="app-topbar-actions"></div>
    </header>
    <main class="app-content">
      <div class="page">
        <div class="log-toolbar">
          <input id="keyword" placeholder="关键字筛选，如设备注册" />
          <input id="page" placeholder="页码，默认1" />
          <input id="pageSize" placeholder="每页条数，默认20" />
          <button id="load" type="button">查询日志</button>
        </div>
        <pre id="result" class="aura-status" role="status" hidden aria-live="polite"></pre>
      </div>
    </main>
  </div>
  <script defer src="../common/shell.js"></script>
  <script defer src="./log.js"></script>
</body>
</html>
