<!-- 文件：日志页（log.html） | File: Log Page -->
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>操作日志</title>
  <script src="../common/theme-pref.js"></script>
  <link rel="stylesheet" href="../common/theme.css" />
  <link rel="stylesheet" href="../common/shell.css" />
  <link rel="stylesheet" href="../common/forms.css" />
  <link rel="stylesheet" href="./log.css?v=20260413c" />
</head>
<body class="app-body" data-shell-title="操作日志">
  <aside class="app-sidebar" id="auraSidebar" aria-label="主导航"></aside>
  <div class="app-frame">
    <header class="app-topbar">
      <button type="button" class="app-sidebar-toggle" id="auraSidebarToggle" aria-label="展开或收起导航">菜单</button>
      <h1 class="app-page-title"></h1>
      <div class="app-topbar-actions"></div>
    </header>
    <main class="app-content">
      <div class="page">
        <div class="log-toolbar">
          <select id="logType">
            <option value="operation">操作日志</option>
            <option value="system">系统日志</option>
          </select>
          <input id="keyword" class="aura-search-input" placeholder="关键字筛选，如设备注册" />
          <button id="load" class="btn-secondary" type="button">查询日志</button>
          <button id="exportLog" class="btn-secondary" type="button" hidden>导出</button>
        </div>
        <pre id="result" class="aura-status aura-display-box" role="status" hidden aria-live="polite"></pre>
        <div id="tableWrap" class="aura-data-table-wrap" hidden>
          <table class="aura-data-table" aria-label="日志列表">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        <div id="pager" hidden></div>
      </div>
    </main>
  </div>
  <script defer src="../common/shell.js"></script>
  <script defer src="./log.js?v=20260413c"></script>
</body>
</html>
