<!-- 文件：用户页（user.html） | File: User Page -->
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>用户</title>
  <link rel="stylesheet" href="./user.css" />
</head>
<body>
  <main class="page">
    <h1>用户管理</h1>
    <div class="row">
      <input id="userName" placeholder="用户名" />
      <input id="password" type="password" placeholder="密码" />
      <input id="roleId" placeholder="角色ID，默认2" />
    </div>
    <div class="row">
      <input id="statusUserId" placeholder="用户ID" />
      <input id="statusValue" placeholder="状态(1启用/0禁用)" />
    </div>
    <button id="create">创建用户</button>
    <button id="updateStatus">更新状态</button>
    <button id="load">查询用户</button>
    <pre id="result">等待操作</pre>
  </main>
  <script src="./user.js"></script>
</body>
</html>
