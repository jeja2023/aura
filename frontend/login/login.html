<!-- 文件：登录页（login.html） | File: Login Page -->
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录</title>
  <script src="../common/theme-pref.js"></script>
  <link rel="stylesheet" href="../common/theme.css" />
  <link rel="stylesheet" href="../common/forms.css" />
  <link rel="stylesheet" href="./login.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-brand">
      <img class="login-brand-icon" src="/common/favicon.svg" alt="寓瞳图标" />
      <span class="login-brand-text">寓瞳</span>
    </div>
    <main class="box">
      <h1>系统登录</h1>
      <p class="login-desc">使用账号登录以访问寓瞳平台。</p>
      <input id="user" class="aura-input" placeholder="用户名" />
      <input id="pass" class="aura-input" type="password" placeholder="密码" />
      <button id="submit">登录</button>
      <pre id="result" class="aura-display-box" hidden></pre>
    </main>
  </div>
  <script src="./login.js"></script>
</body>
</html>
