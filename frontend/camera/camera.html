<!-- 文件：摄像头页（camera.html） | File: Camera Page -->
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>摄像头</title>
  <script src="../common/theme-pref.js"></script>
  <link rel="stylesheet" href="../common/theme.css" />
  <link rel="stylesheet" href="../common/shell.css" />
  <link rel="stylesheet" href="../common/forms.css" />
  <link rel="stylesheet" href="./camera.css" />
</head>
<body class="app-body" data-shell-title="摄像头布点">
  <aside class="app-sidebar" id="auraSidebar" aria-label="主导航"></aside>
  <div class="app-frame">
    <header class="app-topbar">
      <button type="button" class="app-sidebar-toggle" id="auraSidebarToggle" aria-label="展开或收起导航">菜单</button>
      <h1 class="app-page-title"></h1>
      <div class="app-topbar-actions"></div>
    </header>
    <main class="app-content">
      <div class="page">
        <div class="camera-layout">
          <section class="panel camera-panel camera-panel-floors" aria-label="楼层切换">
            <div class="camera-panel-head">
              <h2 class="camera-panel-title">楼层切换</h2>
              <div class="camera-panel-head-actions">
                <span id="floorCount" class="camera-floor-count"></span>
              </div>
            </div>
            <div id="floorSwitchList" class="camera-floor-list" aria-live="polite"></div>
          </section>
          <div class="camera-main">
            <section class="panel camera-panel">
              <div class="camera-panel-head">
                <h2 class="camera-panel-title">楼层图纸与点位</h2>
                <div class="camera-panel-actions">
                  <button id="addPointBtn" class="btn-secondary" type="button">新增点位</button>
                  <button id="listBtn" class="btn-secondary" type="button">刷新</button>
                </div>
              </div>
              <canvas id="canvas" width="980" height="560"></canvas>
            </section>
          </div>
        </div>
        <pre id="result" class="aura-status aura-display-box">提示：点击画布后通过弹窗确认新增点位；拖拽未保存点可调整坐标。</pre>
      </div>
    </main>
  </div>
  <div id="cameraPointModal" class="aura-modal-root" hidden>
    <div class="aura-modal-backdrop" tabindex="-1" aria-hidden="true"></div>
    <div class="aura-modal-panel" role="dialog" aria-modal="true" aria-labelledby="cameraPointModalTitle">
      <div class="aura-modal-head">
        <h2 id="cameraPointModalTitle" class="aura-modal-title">新增点位</h2>
        <button type="button" class="btn-secondary aura-modal-close" data-camera-modal-dismiss aria-label="关闭对话框">关闭</button>
      </div>
      <div class="aura-modal-fields">
        <label>楼层ID <input id="modalFloorId" class="aura-input" type="number" /></label>
        <label>设备ID <input id="modalDeviceId" class="aura-input" type="number" /></label>
        <label>通道号 <input id="modalChannelNo" class="aura-input" type="number" /></label>
        <label>X 坐标 <input id="modalPosX" class="aura-input" type="number" step="0.01" readonly /></label>
        <label>Y 坐标 <input id="modalPosY" class="aura-input" type="number" step="0.01" readonly /></label>
      </div>
      <div class="aura-modal-actions">
        <button type="button" class="btn-secondary" data-camera-modal-dismiss>取消</button>
        <button type="button" id="confirmAddPointBtn" class="btn-primary">确认新增</button>
      </div>
    </div>
  </div>
  <script defer src="../common/shell.js"></script>
  <script defer src="./camera.js"></script>
</body>
</html>
